name: CI ~ Build & Push GHCR

on:
  push:
    branches: [main]
  workflow_dispatch:
  repository_dispatch:
    types:
      - blog_update

permissions:
  contents: read
  packages: write

concurrency:
  group: ghcr-build-push-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: erdaltoprak/erdaltoprak.com
  DOCKERFILE_PATH: ./Dockerfile

jobs:
  build-and-push:
    name: Build and Push GHCR Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Checkout content
        run: |
          rm -rf .content-src src/content
          git clone --depth 1 https://x-access-token:${{ secrets.GH_TOKEN }}@github.com/erdaltoprak/erdaltoprak-com-content.git .content-src
          mkdir -p src/content/blog
          rsync -a .content-src/articles/ src/content/blog/
          rsync -a .content-src/notes/ src/content/blog/
          rm -rf .content-src

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ env.DOCKERFILE_PATH }}
          push: true
          build-args: |
            PUBLIC_TOPRAK_PROJECT_SLUG=${{ secrets.PUBLIC_TOPRAK_PROJECT_SLUG }}
            PUBLIC_TOPRAK_WRITE_KEY=${{ secrets.PUBLIC_TOPRAK_WRITE_KEY }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
